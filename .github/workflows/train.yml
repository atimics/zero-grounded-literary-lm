name: Train

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: 'Frozen experiment ID'
        required: true
        type: choice
        options:
          - q22r
          - q26r
      seeds:
        description: 'Seed 1 or 3 (q22r also permits 1,3)'
        required: true
        type: string
        default: '1,3'
      instance_type:
        description: 'AWS EC2 instance type'
        required: true
        type: choice
        options:
          - c6i.4xlarge
      instance_ami:
        description: 'AMI ID; empty resolves the latest Canonical Ubuntu 24.04 image'
        required: false
        type: string

permissions:
  id-token: write
  contents: write

concurrency:
  group: zero-training-${{ inputs.experiment }}
  cancel-in-progress: false

jobs:
  train:
    name: ${{ inputs.experiment }} · seeds=${{ inputs.seeds }}
    runs-on: ubuntu-24.04
    timeout-minutes: 720
    environment: aws
    env:
      ZERO_EXPERIMENT: ${{ inputs.experiment }}
      ZERO_SEEDS: ${{ inputs.seeds }}
      ZERO_INSTANCE_TYPE: ${{ inputs.instance_type }}
      ZERO_INSTANCE_AMI: ${{ inputs.instance_ami }}
      ZERO_BUCKET: ${{ secrets.AWS_BUCKET }}
      ZERO_REGION: ${{ secrets.AWS_REGION }}
      # Q2.6-R keeps its scientific source pinned while orchestration evolves.
      ZERO_COMMIT: ${{ inputs.experiment == 'q26r' && '3ee802c29ddf47982477a6b6dd635eaedede7bb7' || github.sha }}
      ZERO_ORCHESTRATOR_COMMIT: ${{ github.sha }}
      ZERO_RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate dispatch inputs
        shell: bash
        run: |
          [[ "$ZERO_EXPERIMENT" =~ ^(q22r|q26r)$ ]]
          if [ "$ZERO_EXPERIMENT" = q26r ]; then
            [[ "$ZERO_SEEDS" =~ ^(1|3)$ ]]
          else
            [[ "$ZERO_SEEDS" =~ ^(1|3|1,3|3,1)$ ]]
          fi
          [[ "$ZERO_INSTANCE_TYPE" =~ ^[a-z0-9.-]+$ ]]
          if [ -n "$ZERO_INSTANCE_AMI" ]; then
            [[ "$ZERO_INSTANCE_AMI" =~ ^ami-[0-9a-f]+$ ]]
          fi
          test -n "$ZERO_BUCKET"
          test -n "$ZERO_REGION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ secrets.AWS_TRAINING_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Publish immutable job inputs
        run: |
          git archive --format=tar.gz --output=/tmp/zero-source.tar.gz "$ZERO_COMMIT"
          aws s3 cp scripts/aws/train.sh \
            "s3://${ZERO_BUCKET}/jobs/${ZERO_RUN_ID}/train.sh" \
            --no-cli-pager
          aws s3 cp /tmp/zero-source.tar.gz \
            "s3://${ZERO_BUCKET}/jobs/${ZERO_RUN_ID}/source.tar.gz" \
            --no-cli-pager

      - name: Resolve training AMI
        id: ami
        run: |
          if [ -n "$ZERO_INSTANCE_AMI" ]; then
            ami="$ZERO_INSTANCE_AMI"
          else
            ami=$(aws ssm get-parameter \
              --name /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id \
              --query Parameter.Value \
              --output text \
              --no-cli-pager)
          fi
          [[ "$ami" =~ ^ami-[0-9a-f]+$ ]]
          echo "ami=$ami" >> "$GITHUB_OUTPUT"

      - name: Launch EC2 training instance
        id: launch
        env:
          ZERO_AMI: ${{ steps.ami.outputs.ami }}
        run: |
          user_data=$(base64 -w0 scripts/aws/user-data.sh)
          instance_id=$(aws ec2 run-instances \
            --image-id "$ZERO_AMI" \
            --instance-type "$ZERO_INSTANCE_TYPE" \
            --iam-instance-profile Name=zero-training-ec2 \
            --security-group-ids "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --subnet-id "${{ secrets.AWS_SUBNET_ID }}" \
            --user-data "$user_data" \
            --metadata-options HttpTokens=required,HttpEndpoint=enabled,InstanceMetadataTags=enabled \
            --block-device-mappings '[{"DeviceName":"/dev/sda1","Ebs":{"VolumeSize":64,"VolumeType":"gp3","DeleteOnTermination":true,"Encrypted":true}}]' \
            --instance-initiated-shutdown-behavior terminate \
            --tag-specifications \
              "ResourceType=instance,Tags=[{Key=Project,Value=zero},{Key=Name,Value=zero-train-${ZERO_EXPERIMENT}},{Key=Experiment,Value=${ZERO_EXPERIMENT}},{Key=Seeds,Value=${ZERO_SEEDS}},{Key=Commit,Value=${ZERO_COMMIT}},{Key=RunId,Value=${ZERO_RUN_ID}},{Key=Bucket,Value=${ZERO_BUCKET}},{Key=Region,Value=${ZERO_REGION}}]" \
              "ResourceType=volume,Tags=[{Key=Project,Value=zero},{Key=RunId,Value=${ZERO_RUN_ID}}]" \
            --query 'Instances[0].InstanceId' \
            --output text \
            --no-cli-pager)
          [[ "$instance_id" =~ ^i-[0-9a-f]+$ ]]
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"
          echo "Launched $instance_id"

      - name: Wait for instance completion
        env:
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: |
          while true; do
            state=$(aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query 'Reservations[0].Instances[0].State.Name' \
              --output text \
              --no-cli-pager)
            echo "$(date -u +%H:%M:%S) instance state: $state"
            case "$state" in
              terminated|stopped|stopping|shutting-down) break ;;
              pending|running) sleep 30 ;;
              *) echo "Unexpected EC2 state: $state" >&2; exit 1 ;;
            esac
          done

      - name: Collect training status and results
        run: |
          results_root="benchmarks/zero4-${ZERO_EXPERIMENT}-v1"
          mkdir -p training-diagnostics "$results_root"
          aws s3 cp \
            "s3://${ZERO_BUCKET}/jobs/${ZERO_RUN_ID}/status.json" \
            training-diagnostics/status.json \
            --no-cli-pager
          aws s3 cp \
            "s3://${ZERO_BUCKET}/jobs/${ZERO_RUN_ID}/zero-train.log" \
            training-diagnostics/zero-train.log \
            --no-cli-pager
          aws s3 sync \
            "s3://${ZERO_BUCKET}/jobs/${ZERO_RUN_ID}/results/" \
            "$results_root/" \
            --no-cli-pager
          python3 - <<'PY'
          import json

          status = json.load(open("training-diagnostics/status.json", encoding="utf-8"))
          if status.get("schema") != "zero.aws_training_status.v1":
              raise SystemExit("invalid training status schema")
          if status.get("status") != "complete" or status.get("exit_code") != 0:
              raise SystemExit(f"remote training failed: {status}")
          print("Remote training completed without infrastructure errors")
          PY

      - name: Verify requested seed results
        run: |
          results_root="benchmarks/zero4-${ZERO_EXPERIMENT}-v1"
          IFS=',' read -ra seed_array <<< "$ZERO_SEEDS"
          for seed in "${seed_array[@]}"; do
            seed_root="$results_root/seed${seed}"
            test -f "$seed_root/RESULTS.md"
            test -f "$seed_root/manifest.json"
            if [ "$ZERO_EXPERIMENT" = q26r ]; then
              node scripts/check_zero4_q26r.mjs \
                benchmarks/zero4-q26r-v1/contract.json \
                "$seed_root/optimizer-attempts.jsonl" \
                "$seed_root/result.json"
            fi
          done
          if [ "$ZERO_EXPERIMENT" = q22r ]; then
            python3 scripts/verify_results.py \
              --results-root "$results_root" \
              --skip-registry
          fi

      - name: Record training provenance
        env:
          ZERO_INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          record = {
              "schema": "zero.training_provenance.v1",
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "experiment": os.environ["ZERO_EXPERIMENT"],
              "seeds": os.environ["ZERO_SEEDS"],
              "git_commit": os.environ["ZERO_COMMIT"],
              "orchestrator_commit": os.environ["ZERO_ORCHESTRATOR_COMMIT"],
              "ci_run_id": os.environ["ZERO_RUN_ID"],
              "aws": {
                  "instance_id": os.environ["ZERO_INSTANCE_ID"],
                  "instance_type": os.environ["ZERO_INSTANCE_TYPE"],
                  "region": os.environ["ZERO_REGION"],
              },
          }
          path = Path(f"benchmarks/zero4-{os.environ['ZERO_EXPERIMENT']}-v1") / f"provenance-{os.environ['ZERO_RUN_ID']}.json"
          path.write_text(json.dumps(record, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zero-training-${{ github.run_id }}
          path: training-diagnostics/
          if-no-files-found: warn

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: 'results: ${{ inputs.experiment }} seeds=${{ inputs.seeds }} [ci run ${{ github.run_id }}]'
          file_pattern: 'benchmarks/zero4-${{ inputs.experiment }}-v1/**'
          commit_user_name: zero-ci
          commit_user_email: ci@zero.local

      - name: Terminate instance after workflow failure
        if: always() && steps.launch.outputs.instance_id != ''
        env:
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: |
          state=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text \
            --no-cli-pager 2>/dev/null || true)
          case "$state" in
            terminated|shutting-down|None|'') ;;
            *) aws ec2 terminate-instances --instance-ids "$INSTANCE_ID" --no-cli-pager ;;
          esac
